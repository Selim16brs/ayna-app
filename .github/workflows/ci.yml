name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ayna
          POSTGRES_PASSWORD: ayna
          POSTGRES_DB: ayna
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U ayna"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://ayna:ayna@localhost:5432/ayna?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      FIELD_ENCRYPTION_KEY: ci-field-encryption-key-0000
    steps:
      - uses: actions/checkout@v4
      # pnpm sürümü package.json'daki "packageManager" alanından okunur (çift tanım = hata)
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ayna/api db:generate
      - run: pnpm format:check
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
