# AYNA — yerel geliştirme servisleri (ticket 1.4)
# Kullanım: docker compose -f infrastructure/docker/docker-compose.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: ayna-postgres
    environment:
      POSTGRES_USER: ayna
      POSTGRES_PASSWORD: ayna
      POSTGRES_DB: ayna
    ports:
      - '5432:5432'
    volumes:
      - ayna_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ayna']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ayna-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  # Yerel S3-uyumlu obje depolama (signed upload URL testleri için)
  minio:
    image: minio/minio:latest
    container_name: ayna-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ayna
      MINIO_ROOT_PASSWORD: ayna-secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - ayna_minio:/data

volumes:
  ayna_pg:
  ayna_minio:
